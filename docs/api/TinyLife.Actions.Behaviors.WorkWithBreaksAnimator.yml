  summary: >-
    A simple helper class that allows changing a <xref href="TinyLife.Objects.PersonLike" data-throw-if-not-resolved="false"></xref>'s <xref href="TinyLife.Objects.PersonLike.CurrentPose" data-throw-if-not-resolved="false"></xref> to and from a working variety in set intervals.

